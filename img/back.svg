<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="110mm"
   height="110mm"
   viewBox="0 0 110 110"
   version="1.1"
   id="backButton"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <style>
    .arrow-line {
      fill: none;
      stroke: #4ea13f;
      stroke-width: 12;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .circle {
      fill: white;
      opacity: 90%;
      stroke: none;
    }
  </style>
  <circle
     class="circle"
     id="backCircle"
     cx="55"
     cy="55"
     r="50"
     />
  <g id="backArrow" class="arrow-line">
    <path
      d="M 50,30 25,55 50,80"
    />
    <path
      d="M 25,55 85,55"
    />
  </g>
</svg>
